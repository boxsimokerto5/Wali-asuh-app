name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Password untuk Keystore'
        required: true
        default: 'srma24password'
      key_alias:
        description: 'Alias untuk Key'
        required: true
        default: 'srma24-key'
      key_password:
        description: 'Password untuk Key'
        required: true
        default: 'srma24password'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore srma24-release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=SRMA 24, OU=Kediri, O=SRMA, L=Kediri, ST=Jawa Timur, C=ID"

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-keystore
          path: srma24-release.keystore

      - name: Display Info
        run: |
          echo "Keystore berhasil dibuat!"
          echo "Nama File: srma24-release.keystore"
          echo "Alias: ${{ github.event.inputs.key_alias }}"
          echo "Simpan password Anda dengan aman!"
