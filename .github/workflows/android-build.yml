name: Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Generate Keystore for Release
        run: |
          keytool -genkey -v -keystore srma24-release.keystore \
            -alias srma24-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass srma24password \
            -keypass srma24password \
            -dname "CN=SRMA 24, OU=Kediri, O=SRMA, L=Kediri, ST=Jawa Timur, C=ID"

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Android AAB (Release)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: android-release-keystore
          path: srma24-release.keystore
